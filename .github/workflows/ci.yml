name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-prod:
    runs-on: ubuntu-latest
    env:
      ENV: prod
      DEBUG: "false"
      DATABASE_URL: ""
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v2

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint (ruff)
        run: uv run --with ruff ruff check .

      - name: Tests (pytest)
        shell: bash
        run: |
          set -e
          uv run pytest -q || code=$?
          if [ "${code:-0}" -eq 5 ]; then
            echo "No tests collected."
            exit 0
          fi
          exit ${code:-0}
